<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Gamepad body -->
  <rect x="14" y="22" width="36" height="22" rx="11" fill="url(#accent)"/>
  <!-- D-pad -->
  <rect x="20" y="29" width="4" height="10" rx="1" fill="#1a1a2e"/>
  <rect x="17" y="32" width="10" height="4" rx="1" fill="#1a1a2e"/>
  <!-- Buttons -->
  <circle cx="43" cy="30" r="2.5" fill="#1a1a2e"/>
  <circle cx="48" cy="34" r="2.5" fill="#1a1a2e"/>
  <circle cx="38" cy="34" r="2.5" fill="#1a1a2e"/>
  <circle cx="43" cy="38" r="2.5" fill="#1a1a2e"/>
  <!-- Joysticks -->
  <circle cx="24" cy="42" r="4" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="40" cy="42" r="4" fill="#1a1a2e" opacity="0.5"/>
</svg>
