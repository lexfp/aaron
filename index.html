<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron's Game Hub</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a1a2e, #0f0f1a);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(90deg, #ff4444, #ff8800, #ffaa00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 5px 15px rgba(255, 68, 68, 0.3);
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 350px;
            padding: 20px;
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .game-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .game-link:hover::before {
            left: 150%;
        }

        .game-link:hover {
            transform: translateY(-5px);
            border-color: #ffaa00;
            background: rgba(255, 170, 0, 0.05);
            box-shadow: 0 10px 25px rgba(255, 170, 0, 0.2);
        }

        .site-footer {
            margin-top: 50px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .site-footer a {
            color: #ffaa00;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .site-footer a:hover {
            color: #ff4444;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
        }
        
        .github-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
