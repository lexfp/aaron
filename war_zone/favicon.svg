<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#ff4444" stroke-width="2" opacity="0.6"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.3"/>
  <!-- Crosshair lines -->
  <line x1="32" y1="8" x2="32" y2="24" stroke="url(#cross)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="40" x2="32" y2="56" stroke="url(#cross)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8" y1="32" x2="24" y2="32" stroke="url(#cross)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="32" x2="56" y2="32" stroke="url(#cross)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#ff4444"/>
  <circle cx="32" cy="32" r="1.5" fill="#ff0000"/>
  <!-- Corner ticks -->
  <line x1="10" y1="10" x2="18" y2="10" stroke="#ff4444" stroke-width="1.5" opacity="0.4"/>
  <line x1="10" y1="10" x2="10" y2="18" stroke="#ff4444" stroke-width="1.5" opacity="0.4"/>
  <line x1="54" y1="10" x2="46" y2="10" stroke="#ff4444" stroke-width="1.5" opacity="0.4"/>
  <line x1="54" y1="10" x2="54" y2="18" stroke="#ff4444" stroke-width="1.5" opacity="0.4"/>
  <line x1="10" y1="54" x2="18" y2="54" stroke="#ff4444" stroke-width="1.5" opacity="0.4"/>
  <line x1="10" y1="54" x2="10" y2="46" stroke="#ff4444" stroke-width="1.5" opacity="0.4"/>
  <line x1="54" y1="54" x2="46" y2="54" stroke="#ff4444" stroke-width="1.5" opacity="0.4"/>
  <line x1="54" y1="54" x2="54" y2="46" stroke="#ff4444" stroke-width="1.5" opacity="0.4"/>
</svg>
